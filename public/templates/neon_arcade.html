<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Arcade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.03) 2px, rgba(0,255,136,0.03) 4px);
    pointer-events: none;
    z-index: 0;
    animation: scanlines 8s linear infinite;
  }
  @keyframes scanlines { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }
  .container { position: relative; z-index: 1; width: 100%; max-width: 360px; padding: 16px; }
  .header { text-align: center; margin-bottom: 12px; }
  .title {
    font-size: 22px;
    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88, 0 0 40px #00ff88;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .subtitle { font-size: 10px; color: #00cc66; letter-spacing: 2px; margin-top: 2px; }
  .timer-bar-wrap { margin: 8px 0; }
  .timer-label { font-size: 10px; color: #00ff88; letter-spacing: 2px; margin-bottom: 4px; display: flex; justify-content: space-between; }
  .timer-bar { height: 6px; background: #001a0d; border: 1px solid #00ff88; border-radius: 3px; overflow: hidden; box-shadow: 0 0 8px #00ff88; }
  .timer-fill { height: 100%; background: linear-gradient(90deg, #00ff88, #00ffcc); transition: width 1s linear; box-shadow: 0 0 10px #00ff88; }
  .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 11px; letter-spacing: 2px; }
  .score { color: #ff0066; text-shadow: 0 0 8px #ff0066; }
  .pairs { color: #00ccff; text-shadow: 0 0 8px #00ccff; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .cell {
    aspect-ratio: 1;
    background: #001a0d;
    border: 1px solid #00ff88;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 0 6px rgba(0,255,136,0.3), inset 0 0 6px rgba(0,255,136,0.05);
    color: #00ff88;
    text-shadow: 0 0 8px #00ff88;
    position: relative;
  }
  .cell:hover { background: #002a15; box-shadow: 0 0 12px #00ff88, inset 0 0 10px rgba(0,255,136,0.1); }
  .cell.selected {
    background: #003820;
    border-color: #ff0066;
    box-shadow: 0 0 15px #ff0066, inset 0 0 10px rgba(255,0,102,0.2);
    color: #ff0066;
    text-shadow: 0 0 10px #ff0066;
    transform: scale(1.08);
  }
  .cell.cleared {
    background: #050505;
    border-color: #1a1a1a;
    color: #1a1a1a;
    text-shadow: none;
    box-shadow: none;
    cursor: default;
    pointer-events: none;
  }
  .cell.flash {
    animation: neonFlash 0.3s ease;
  }
  @keyframes neonFlash {
    0% { background: #00ff88; border-color: #00ff88; box-shadow: 0 0 30px #00ff88; }
    100% { background: #050505; border-color: #1a1a1a; }
  }
  .hint-arrow {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    color: #ff0066;
    text-shadow: 0 0 10px #ff0066;
    animation: bounce 0.5s ease infinite alternate;
    pointer-events: none;
  }
  @keyframes bounce { from { top: -28px; } to { top: -20px; } }
  .rule { text-align: center; font-size: 10px; color: #005533; letter-spacing: 1px; }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .overlay-title {
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-shadow: 0 0 20px currentColor;
  }
  .overlay-sub { font-size: 12px; letter-spacing: 2px; margin-bottom: 24px; opacity: 0.7; }
  .cta-btn {
    background: transparent;
    border: 2px solid #00ff88;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 14px 32px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 20px #00ff88, inset 0 0 10px rgba(0,255,136,0.1);
    animation: pulse 1.5s ease infinite;
    transition: all 0.2s;
  }
  .cta-btn:hover { background: rgba(0,255,136,0.1); box-shadow: 0 0 40px #00ff88; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 15px #00ff88; } 50% { box-shadow: 0 0 35px #00ff88, 0 0 60px #00ff88; } }
  .countdown-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .countdown-overlay.show { display: flex; }
  .countdown-num {
    font-size: 80px;
    font-weight: bold;
    color: #ff0066;
    text-shadow: 0 0 30px #ff0066, 0 0 60px #ff0066;
    animation: countPop 0.8s ease-out;
  }
  @keyframes countPop { 0% { transform: scale(1.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .go-text { font-size: 48px; font-weight: bold; color: #00ff88; text-shadow: 0 0 30px #00ff88; letter-spacing: 8px; }
</style>
</head>
<body>
<div class="countdown-overlay show" id="countdownOverlay">
  <div class="countdown-num" id="countNum">3</div>
</div>

<div class="overlay" id="endOverlay">
  <div class="overlay-title" id="endTitle">SYSTEM HACKED</div>
  <div class="overlay-sub" id="endSub">ACCESS GRANTED</div>
  <button class="cta-btn" onclick="openStore()">▶ DOWNLOAD NOW</button>
</div>

<div class="container">
  <div class="header">
    <div class="title">NEON ARCADE</div>
    <div class="subtitle">MATCH · CLEAR · SURVIVE</div>
  </div>
  <div class="timer-bar-wrap">
    <div class="timer-label"><span>TIME</span><span id="timerText">25</span></div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
  </div>
  <div class="score-row">
    <span class="score">SCORE: <span id="scoreVal">0</span></span>
    <span class="pairs">PAIRS: <span id="pairsVal">0</span>/8</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="rule">TAP TWO NUMBERS THAT SUM TO 10</div>
</div>

<script>
const IOS_URL = 'https://apps.apple.com';
const ANDROID_URL = 'https://play.google.com';
const TIME_LIMIT = 25;

function openStore() {
  const url = /iPad|iPhone|iPod/.test(navigator.userAgent) ? IOS_URL : ANDROID_URL;
  if (typeof mraid !== 'undefined') mraid.open(url); else window.open(url, '_blank');
}

let numbers = [], selected = null, pairs = 0, score = 0, timeLeft = TIME_LIMIT;
let timerInterval = null, gameActive = false, hintShown = false;

function generateNumbers() {
  const vals = [];
  for (let i = 0; i < 8; i++) {
    const a = Math.floor(Math.random() * 9) + 1;
    const b = 10 - a;
    vals.push(a, b);
  }
  return vals.sort(() => Math.random() - 0.5);
}

function findFirstPair(nums) {
  for (let i = 0; i < nums.length; i++) {
    for (let j = i + 1; j < nums.length; j++) {
      if (nums[i] !== null && nums[j] !== null && nums[i] + nums[j] === 10) return [i, j];
    }
  }
  return null;
}

function buildGrid() {
  numbers = generateNumbers();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  numbers.forEach((n, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = n;
    cell.dataset.index = i;
    cell.addEventListener('click', () => onCellClick(i));
    grid.appendChild(cell);
  });
}

function getCells() { return document.querySelectorAll('.cell'); }

function onCellClick(idx) {
  if (!gameActive) return;
  const cells = getCells();
  if (cells[idx].classList.contains('cleared')) return;
  if (selected === null) {
    selected = idx;
    cells[idx].classList.add('selected');
  } else if (selected === idx) {
    cells[idx].classList.remove('selected');
    selected = null;
  } else {
    const a = numbers[selected], b = numbers[idx];
    if (a + b === 10) {
      cells[selected].classList.remove('selected');
      cells[selected].classList.add('flash');
      cells[idx].classList.add('flash');
      setTimeout(() => {
        cells[selected].classList.add('cleared');
        cells[selected].textContent = '';
        cells[idx].classList.add('cleared');
        cells[idx].textContent = '';
        numbers[selected] = null;
        numbers[idx] = null;
      }, 280);
      pairs++;
      score += 100;
      document.getElementById('pairsVal').textContent = pairs;
      document.getElementById('scoreVal').textContent = score;
      selected = null;
      if (pairs === 8) { setTimeout(endGame, 400, true); }
    } else {
      cells[selected].classList.remove('selected');
      cells[idx].classList.add('selected');
      selected = idx;
    }
  }
}

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerText').textContent = timeLeft;
    document.getElementById('timerFill').style.width = (timeLeft / TIME_LIMIT * 100) + '%';
    if (timeLeft <= 0) { clearInterval(timerInterval); endGame(false); }
  }, 1000);
}

function endGame(win) {
  gameActive = false;
  clearInterval(timerInterval);
  const overlay = document.getElementById('endOverlay');
  document.getElementById('endTitle').textContent = win ? 'SYSTEM HACKED' : 'GAME OVER';
  document.getElementById('endTitle').style.color = win ? '#00ff88' : '#ff0066';
  document.getElementById('endSub').textContent = win ? 'ACCESS GRANTED — SCORE: ' + score : 'SYSTEM DEFENDED — TRY AGAIN';
  overlay.classList.add('show');
}

function showHint() {
  const pair = findFirstPair(numbers);
  if (!pair) return;
  const cells = getCells();
  const arrow = document.createElement('div');
  arrow.className = 'hint-arrow';
  arrow.textContent = '▼';
  cells[pair[0]].style.position = 'relative';
  cells[pair[0]].appendChild(arrow);
  setTimeout(() => arrow.remove(), 2500);
}

function startCountdown() {
  const overlay = document.getElementById('countdownOverlay');
  const num = document.getElementById('countNum');
  let count = 3;
  const tick = setInterval(() => {
    count--;
    if (count === 0) {
      num.className = 'go-text';
      num.textContent = 'GO!';
      setTimeout(() => {
        overlay.classList.remove('show');
        gameActive = true;
        startTimer();
        setTimeout(() => { if (!hintShown) { showHint(); hintShown = true; } }, 800);
      }, 600);
      clearInterval(tick);
    } else {
      num.textContent = count;
      num.className = 'countdown-num';
    }
  }, 900);
}

buildGrid();
startCountdown();
</script>
</body>
</html>
