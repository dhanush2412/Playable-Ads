<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Sum Link - Hindi Newspaper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0e0}
#stage{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden}
#np{position:absolute;top:0;left:0;width:100%;height:auto;transform-origin:0 0;transition:transform 0s}
#highlight{position:absolute;border:3px solid #e8c84a;border-radius:4px;box-shadow:0 0 0 2000px rgba(0,0,0,.45);opacity:0;transition:opacity .5s;pointer-events:none;z-index:10}
#highlight.show{opacity:1}
#caption{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:#fff;font-size:12px;font-weight:600;padding:8px 18px;border-radius:22px;text-align:center;max-width:90%;line-height:1.4;opacity:0;transition:opacity .4s;z-index:20;pointer-events:none}
#caption.show{opacity:1}
#go{position:absolute;opacity:0;transition:opacity .6s;pointer-events:none;z-index:5}
#gr{display:grid;grid-template-columns:repeat(7,1fr);width:100%;height:100%;border-top:2px solid #1a1a2e;border-left:2px solid #1a1a2e}
.c{display:flex;align-items:center;justify-content:center;font-size:clamp(13px,3.2vw,19px);font-weight:800;color:#1a1a2e;background:rgba(255,255,255,.9);border-right:2px solid #1a1a2e;border-bottom:2px solid #1a1a2e;position:relative}
.c.sel{background:#d0e4ff;color:#2860d0}
.c.clr{background:rgba(245,240,224,.4);color:transparent}
.sparkle{position:absolute;pointer-events:none;z-index:50}
.spark{position:absolute;opacity:0}
.spark.dot{border-radius:50%;background:#ffd700;animation:sOut .65s ease forwards}
.spark.star{background:transparent;animation:sOut .65s ease forwards}
.spark.star::before{content:"\2726";color:#ffd700;font-size:10px;display:block;text-align:center}
@keyframes sOut{0%{opacity:1;transform:scale(0) translate(0,0)}60%{opacity:1;transform:scale(1.3) translate(var(--dx,12px),var(--dy,12px))}100%{opacity:0;transform:scale(.7) translate(var(--dx,14px),var(--dy,14px))}}
@keyframes hBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ctaP{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
#pill{position:fixed;bottom:28%;left:50%;transform:translateX(-50%);padding:6px 22px;border-radius:20px;font-size:14px;font-weight:700;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:60}
#pill.s{opacity:1}
#pill.ok{background:#4cd964;color:#fff}
#pbar{position:fixed;bottom:calc(28% - 14px);left:20%;width:60%;height:4px;background:rgba(0,0,0,.15);border-radius:2px;overflow:hidden;z-index:60}
#pfill{height:100%;width:0%;background:#4cd964;transition:width .5s ease;border-radius:2px}
#hand{position:fixed;font-size:26px;z-index:70;pointer-events:none;opacity:0;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));transition:left .35s ease,top .35s ease,opacity .25s}
#end{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:90;padding:24px}
#end.s{display:flex;animation:fadeIn .7s ease}
#end-icon{font-size:54px}
#end-title{color:#fff;font-size:24px;font-weight:800;text-align:center;line-height:1.25}
#end-sub{color:rgba(255,255,255,.72);font-size:13px;text-align:center;max-width:260px;line-height:1.5}
#end-cta{background:#4cd964;color:#fff;border:none;padding:15px 44px;border-radius:28px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(76,217,100,.4);animation:ctaP 1.8s infinite}
</style>

  <div id="end-title">आपका IQ अधिक है!<br>आप सूची में हैं!</div>
  <div id="end-sub">आज ही SumLink खेलें और अपना दिमाग परखें</div>
  <button id="end-cta" onclick="handleCTA()">अभी खेलें &#8594;</button>
</div>
<script>
(function(){
"use strict";
var COLS=7;
var STORE_URL="https://play.google.com/store/apps/details?id=com.ezgamers.sumlink";
var SRC=[
  4,7,8,6,6,3,4,
  7,8,1,9,4,7,4,
  5,2,3,5,1,4,2,
  1,3,5,7,9,2,4,
  9,1,2,3,5,8,1,
  3,6,9,2,4,6,7,
  2,4,6,8,0,2,4
];
var g=[],mc=0,over=false,TOTAL=6;
var $g,$pfill,$pill,$hand,$end,$go,$np,$hl,$cap,$vo;

window.addEventListener("DOMContentLoaded",function(){
  $g   =document.getElementById("gr");
  $pfill=document.getElementById("pfill");
  $pill=document.getElementById("pill");
  $hand=document.getElementById("hand");
  $end =document.getElementById("end");
  $go  =document.getElementById("go");
  $np  =document.getElementById("np");
  $hl  =document.getElementById("highlight");
  $cap =document.getElementById("caption");
  $vo  =document.getElementById("vo");
  buildGrid();
  run();
});

// Hindi newspaper: 583x699 portrait
function imgW(){return window.innerWidth;}
function imgH(){return window.innerWidth*(699/583);}

function setNpTransform(s,tx,ty,animated){
  $np.style.transition = animated ? "transform 2.5s cubic-bezier(.4,0,.2,1)" : "transform 0s";
  $np.style.transform = "scale("+s+") translate("+tx+"px,"+ty+"px)";
}

function run(){
  var sw=window.innerWidth, sh=window.innerHeight;
  var ih=imgH();

  // PHASE 1: show full newspaper centered (0-1.5s)
  var ty0 = (sh - ih) / 2;
  setNpTransform(1, 0, ty0, false);

  // PHASE 2 (1.5s): zoom to Hindi article subheadline
  // Target: "\u092A\u0939\u0947\u0932\u0940 \u0916\u0947\u0932 \u0916\u0947\u0932\u0928\u0947 \u0935\u093E\u0932\u094B\u0902 \u0915\u093E \u0938\u094D\u0915\u094B\u0930 40% \u0905\u0927\u093F\u0915" line at ~28% down
  setTimeout(function(){
    var zs = 1.15;
    var cx = sw * 0.25;
    var cy = ih * 0.28;
    var tx = sw * 0.5 / zs - cx;
    var ty = sh * 0.45 / zs - cy;
    $np.style.transition = "transform 2.5s cubic-bezier(.4,0,.2,1)";
    $np.style.transform = "scale("+zs+") translate("+tx+"px,"+ty+"px)";

    setTimeout(function(){
      var hlTop = zs*(cy+ty) - 20;
      posHighlight(0, hlTop, sw, 40);
      $hl.classList.add("show");
      $cap.textContent = "\u092A\u0939\u0947\u0932\u0940 \u0916\u0947\u0932 \u0916\u0947\u0932\u0928\u0947 \u0935\u093E\u0932\u094B\u0902 \u0915\u093E \u0938\u094D\u0915\u094B\u0930 40% \u0905\u0927\u093F\u0915 \u2014 \u0909\u0928\u0915\u093E \u0926\u093F\u092E\u093E\u0917 \u092A\u0939\u0932\u0947 \u0938\u0947 \u0939\u0940 \u0907\u0938\u0915\u0947 \u0932\u093F\u090F \u0924\u0948\u092F\u093E\u0930 \u0939\u0948";
      $cap.classList.add("show");
      if($vo.src) $vo.play().catch(function(){});
    }, 2600);
  }, 1500);

  // PHASE 3 (12s): zoom to grid area (right side of Hindi newspaper)
  setTimeout(function(){
    $hl.classList.remove("show");
    $cap.classList.remove("show");
    var zs3 = 2.5;
    var gx = sw * 0.72;
    var gy = ih * 0.65;
    var tx3 = sw * 0.5 / zs3 - gx;
    var ty3 = sh * 0.45 / zs3 - gy;
    $np.style.transition = "transform 2s cubic-bezier(.4,0,.2,1)";
    $np.style.transform = "scale("+zs3+") translate("+tx3+"px,"+ty3+"px)";
  }, 12000);

  // PHASE 4 (14.5s): show game grid, start auto-play
  setTimeout(function(){
    posGrid(sw, sh);
    $go.style.opacity = "1";
    setTimeout(startAutoPlay, 600);
  }, 14500);
}

function posHighlight(l,t,w,h){
  $hl.style.left=l+"px";
  $hl.style.top=t+"px";
  $hl.style.width=w+"px";
  $hl.style.height=h+"px";
}

function posGrid(sw,sh){
  var gl=sw*0.35, gt=sh*0.30;
  var gw=sw*0.62, gh=sh*0.58;
  gl=Math.max(2,gl);
  $go.style.left=Math.round(gl)+"px";
  $go.style.top=Math.round(gt)+"px";
  $go.style.width=Math.round(gw)+"px";
  $go.style.height=Math.round(gh)+"px";
}

function buildGrid(){
  $g.innerHTML="";
  g=SRC.slice();
  for(var i=0;i<g.length;i++){
    var d=document.createElement("div");
    d.className="c";d.textContent=g[i]||"";d.dataset.i=i;
    $g.appendChild(d);
  }
}

function findPair(){
  var rows=Math.floor(g.length/COLS);
  for(var r=0;r<rows;r++){
    for(var c=0;c<COLS;c++){
      var i=r*COLS+c;
      if(!g[i])continue;
      if(c<COLS-1){var j=i+1;if(g[j]&&(g[i]===g[j]||g[i]+g[j]===10))return[i,j];}
      if(r<rows-1){var k=i+COLS;if(g[k]&&(g[i]===g[k]||g[i]+g[k]===10))return[i,k];}
    }
  }
  return null;
}

function pointAt(el){
  var r=el.getBoundingClientRect();
  $hand.style.left=(r.left+r.width/2-13)+"px";
  $hand.style.top=(r.top+r.height-4)+"px";
  $hand.style.opacity="1";
  $hand.style.animation="hBounce .9s ease-in-out infinite";
}

function sparkle(el){
  var r=el.getBoundingClientRect();
  var cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(var i=0;i<6;i++){
    var sp=document.createElement("div");sp.className="sparkle";
    sp.style.left=cx+"px";sp.style.top=cy+"px";
    document.body.appendChild(sp);
    var dot=document.createElement("div");dot.className="spark dot";
    var ang=(Math.PI*2/6)*i,d=16+Math.random()*12,sz=4+Math.random()*4;
    dot.style.cssText="width:"+sz+"px;height:"+sz+"px;left:"+(Math.cos(ang)*d-sz/2)+"px;top:"+(Math.sin(ang)*d-sz/2)+"px";
    sp.appendChild(dot);
    if(i%2===0){
      var st=document.createElement("div");st.className="spark star";
      var a2=(Math.PI*2/3)*i,d2=10+Math.random()*12;
      st.style.cssText="width:10px;height:10px;left:"+(Math.cos(a2)*d2-5)+"px;top:"+(Math.sin(a2)*d2-5)+"px";
      sp.appendChild(st);
    }
    (function(e){setTimeout(function(){e.remove();},700);})(sp);
  }
}

function showPill(txt,ok){
  $pill.textContent=txt;
  $pill.className=(ok?"ok":"")+" s";
  clearTimeout(showPill._t);
  showPill._t=setTimeout(function(){$pill.classList.remove("s");},1400);
}

function startAutoPlay(){setTimeout(runPair,400);}

function runPair(){
  if(over)return;
  var pair=findPair();
  if(!pair){showEnd();return;}
  var ca=$g.children[pair[0]],cb=$g.children[pair[1]];
  pointAt(ca);ca.classList.add("sel");
  setTimeout(function(){
    pointAt(cb);cb.classList.add("sel");
    setTimeout(function(){
      var v1=g[pair[0]],v2=g[pair[1]];
      showPill(v1===v2?"\u090F\u0915 \u091C\u094B\u0921\u093C\u0940!":"\u091C\u094B\u0921\u093C 10!",true);
      mc++;$pfill.style.width=Math.min(100,(mc/TOTAL)*100)+"%";
      setTimeout(function(){sparkle(ca);sparkle(cb);},100);
      setTimeout(function(){
        ca.classList.remove("sel");cb.classList.remove("sel");
        ca.classList.add("clr");cb.classList.add("clr");
        ca.textContent="";cb.textContent="";
        g[pair[0]]=0;g[pair[1]]=0;
        $hand.style.opacity="0";
        if(mc>=TOTAL){over=true;setTimeout(showEnd,600);return;}
        setTimeout(runPair,900);
      },550);
    },600);
  },750);
}

function showEnd(){$end.classList.add("s");}

window.handleCTA=function(){
  if(typeof mraid!=="undefined")mraid.open(STORE_URL);
  else window.open(STORE_URL,"_blank");
};
})();
</script>
</body>
</html>
